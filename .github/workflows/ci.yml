name: Fraud Detection CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r credit-card-fraud-detection/requirements.txt

    - name: Generate mock models for testing
      run: |
        python credit-card-fraud-detection/tests/create_mock_models.py

    - name: Run unit and integration tests with pytest
      run: |
        pytest credit-card-fraud-detection/

    # Étape CD : Validation de la construction de l'image de conteneur
    - name: Build Docker Image
      run: |
        docker build -t fraud-detection-api:latest .
